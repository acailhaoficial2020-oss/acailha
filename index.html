<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Açailha — Fichas Técnicas & Precificação</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫐</text></svg>">
<style>
:root{--p1:#2D1B69;--p2:#5B3A9E;--p3:#7c3aed;--p4:#e9d5ff;--p5:#f3f0ff;--g:#059669;--r:#dc2626;--y:#854d0e;--b:#1d4ed8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;font-size:14px}
.hdr{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.hdr small{color:#c4b5fd;font-size:11px;display:block;margin-top:2px}
.hdr button{font-size:11px;color:#c4b5fd;border:1px solid #7c3aed;padding:5px 12px;border-radius:8px;background:none;cursor:pointer}
.hdr button:hover{background:rgba(255,255,255,0.1)}
.tabs{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;position:sticky;top:0;z-index:10}
.tabs button{padding:12px 20px;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;color:#9ca3af;transition:all .2s}
.tabs button.active{border-bottom-color:var(--p2);color:var(--p1);background:var(--p5)}
.tabs button:hover{color:var(--p2)}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{color:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card .lbl{font-size:11px;opacity:.8}.card .val{font-size:20px;font-weight:900;margin-top:4px}
.panel{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);border:1px solid #e5e7eb;overflow:hidden;margin-bottom:16px}
.panel-hdr{background:var(--p1);color:#fff;padding:10px 16px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.panel-hdr span{color:#c4b5fd;font-size:11px;font-weight:400}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--p5);color:var(--p1);padding:8px 10px;font-size:11px;font-weight:700;text-align:left;white-space:nowrap}
td{padding:7px 10px;border-top:1px solid #f3e8ff;font-size:13px}
tr:nth-child(even){background:#faf5ff20}
tr.clickable{cursor:pointer}tr.clickable:hover{background:#f3f0ff}
.inp{width:80px;padding:5px 8px;text-align:right;color:var(--b);font-weight:600;border:2px solid #bfdbfe;border-radius:8px;background:#eff6ff;outline:none;font-size:13px;font-family:inherit}
.inp:focus{border-color:var(--p3);box-shadow:0 0 0 2px #e9d5ff}
.inp-sm{width:60px}.inp-md{width:85px}.inp-lg{width:100px}
select.inp{width:auto;padding:5px 4px;text-align:center}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.tag-auto{background:var(--p4);color:var(--p3)}.tag-warn{background:#fef08a;color:var(--y)}
.mg-ok{background:#d1fae5;color:#065f46}.mg-warn{background:#fef3c7;color:#92400e}.mg-bad{background:#fee2e2;color:#991b1b}
.alert{padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:8px;border:1px solid}
.alert-y{background:#fefce8;border-color:#fde68a;color:var(--y)}
.alert-r{background:#fef2f2;border-color:#fecaca;color:var(--r)}
.prod-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.prod-btn{padding:8px 16px;border-radius:12px;font-size:13px;font-weight:700;border:2px solid #d8b4fe;background:#fff;color:var(--p2);cursor:pointer;transition:all .2s}
.prod-btn.active{background:var(--p2);color:#fff;border-color:var(--p2);transform:scale(1.05)}
.prod-btn:hover{border-color:var(--p3)}
.hero{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 4px 12px rgba(45,27,105,.3)}
.hero h2{font-size:20px;font-weight:900}.hero .meta{display:flex;flex-wrap:wrap;gap:24px;margin-top:12px}
.hero .meta>div .lbl{color:#c4b5fd;font-size:11px;display:block;margin-bottom:4px}
.hero .meta .big{font-size:22px;font-weight:900}.hero .yellow{color:#fde047}
.total-row{background:var(--p4)!important;border-top:2px solid #a78bfa!important}
.total-row td{font-weight:900;color:var(--p1);padding:10px}
.info-box{background:var(--p5);border:1px solid #d8b4fe;border-radius:12px;padding:14px;font-size:13px;color:#5b21b6}
.foot{text-align:center;padding:24px;font-size:11px;color:#9ca3af}
.green{color:var(--g)}.red{color:var(--r)}.blue{color:var(--b)}.bold{font-weight:700}
@media(min-width:640px){.cards{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div id="app"></div>

<script>
const COMM=[1,1.5,2,2.5,3,3.5,4,4.5,5];
const cur=v=>"R$ "+(v||0).toFixed(2).replace(".",",");

const INIT_INS=[
{id:1,nm:"Polpa de Acai",qe:1,un:"KG",pe:16.35},
{id:2,nm:"Acucar",qe:25,un:"KG",pe:76},
{id:3,nm:"Emulsificante",qe:10,un:"KG",pe:173.91},
{id:4,nm:"Liga Neutra",qe:20,un:"KG",pe:314.53},
{id:5,nm:"Corante Caramelo",qe:25,un:"KG",pe:173},
{id:6,nm:"Libergel",qe:20,un:"KG",pe:873},
{id:7,nm:"Acido Citrico",qe:25,un:"KG",pe:378},
{id:8,nm:"Roxinho",qe:99.5,un:"LT",pe:0,auto:true},
{id:9,nm:"Agua",qe:1,un:"LT",pe:0.10},
{id:10,nm:"Ext. Guarana",qe:20,un:"LT",pe:960},
{id:11,nm:"Glucose em Po",qe:25,un:"KG",pe:181},
{id:12,nm:"Maltodextrina",qe:25,un:"KG",pe:0},
{id:13,nm:"Cremofruta",qe:10,un:"KG",pe:0},
{id:14,nm:"Cremotech FR10",qe:10,un:"KG",pe:0},
{id:15,nm:"Leite Kerry",qe:25,un:"KG",pe:559},
{id:16,nm:"Aroma Cupuacu",qe:10,un:"KG",pe:249.30},
{id:17,nm:"Etenia",qe:25,un:"KG",pe:873},
{id:18,nm:"Liber Gel Zero",qe:40,un:"KG",pe:1650},
{id:19,nm:"Cor. Vermelho",qe:25,un:"KG",pe:3280},
{id:20,nm:"Cor. Azul",qe:2,un:"KG",pe:534},
{id:21,nm:"Benzoato",qe:25,un:"KG",pe:378}
];

const mE=(ps)=>[
{nm:"Caixa 10L",lit:8.2,ce:5.5,com:5,pv:ps[0]},
{nm:"Caixa 5L",lit:4.0,ce:4.5,com:5,pv:ps[1]},
{nm:"Pote 2L",lit:1.8,ce:3.5,com:5,pv:ps[2]},
{nm:"Pote 1L",lit:0.8,ce:3.0,com:5,pv:ps[3]},
{nm:"Pote 200g",lit:0.2,ce:2.5,com:5,pv:ps[4]}
];

const INIT_PRODS=[
{id:1,nm:"Acai Paulistano",rend:590.02,ings:[{iid:9,q:348},{iid:2,q:67},{iid:11,q:67},{iid:12,q:15},{iid:1,q:61},{iid:13,q:18},{iid:14,q:4.88},{iid:10,q:1.34},{iid:5,q:1.34},{iid:7,q:1.3},{iid:8,q:4}],embs:mE([118,78,50,30,6.4])},
{id:8,nm:"Acai Premium",rend:656.3,ings:[{iid:1,q:220},{iid:2,q:120},{iid:3,q:8.5},{iid:4,q:8.5},{iid:5,q:2.5},{iid:7,q:0.3},{iid:8,q:4},{iid:9,q:290},{iid:10,q:2.5}],embs:mE([152,71,30,25,8.2])},
{id:2,nm:"Cupuacu",rend:600,ings:[{iid:9,q:400},{iid:2,q:120},{iid:16,q:20},{iid:4,q:4},{iid:3,q:5.2},{iid:15,q:80},{iid:7,q:0.2},{iid:6,q:2}],embs:mE([110,62,30,25,6.5])},
{id:3,nm:"Acai Gold",rend:9,ings:[{iid:1,q:5},{iid:9,q:2.5},{iid:2,q:1.4},{iid:10,q:0.005},{iid:6,q:0.08}],embs:mE([200,102,50,30,9.7])},
{id:4,nm:"Acai Branco",rend:11.475,ings:[{iid:1,q:5},{iid:2,q:1.7},{iid:17,q:0.13},{iid:6,q:0.13},{iid:7,q:0.015},{iid:9,q:4.5}],embs:mE([0,102,50,30,9.7])},
{id:5,nm:"Acai Zero",rend:10.3,ings:[{iid:9,q:4},{iid:1,q:4},{iid:18,q:2.3}],embs:mE([200,98,50,40,8.8])},
{id:6,nm:"Calda Base Sorvete",rend:80,ings:[{iid:9,q:60},{iid:2,q:14.8},{iid:15,q:12},{iid:3,q:0.48},{iid:6,q:0.48}],embs:mE([120,60,40,30,6.4])},
{id:7,nm:"Roxinho",rend:99.5,isIng:true,ings:[{iid:9,q:90},{iid:19,q:8.5},{iid:20,q:0.65},{iid:7,q:0.175},{iid:21,q:0.175}],embs:[]}
];

let S={tab:"fichas",sel:0,ins:JSON.parse(JSON.stringify(INIT_INS)),prods:JSON.parse(JSON.stringify(INIT_PRODS))};

async function loadData(){
  try{const r=localStorage.getItem("acailha-v6");if(r){const d=JSON.parse(r);if(d.ins)S.ins=d.ins;if(d.prods)S.prods=d.prods;}}catch(e){}
  render();
}
async function saveData(){
  try{localStorage.setItem("acailha-v6",JSON.stringify({ins:S.ins,prods:S.prods}));}catch(e){}
}

function getUp(id){const i=S.ins.find(x=>x.id===id);return i&&i.qe>0?i.pe/i.qe:0;}
function compute(){
  const rp=S.prods.find(p=>p.isIng);
  const rb=rp?rp.ings.reduce((s,g)=>s+g.q*getUp(g.iid),0):0;
  const rup=rp&&rp.rend>0?rb/rp.rend:0;
  const gp=id=>id===8?rup:getUp(id);
  return S.prods.map(p=>{
    const batch=p.ings.reduce((s,g)=>s+g.q*gp(g.iid),0);
    const cpl=p.rend>0?batch/p.rend:0;
    const ingsD=p.ings.map(g=>{const i=S.ins.find(x=>x.id===g.iid);const up=gp(g.iid);return{...g,nome:i?i.nm:"?",un:i?i.un:"?",up,total:g.q*up,noPrice:up===0};});
    const embsC=(p.embs||[]).map(e=>{const cr=cpl*e.lit;const comR=e.pv*(e.com/100);const ct=cr+e.ce+comR;const mr=e.pv-ct;const mp=e.pv>0?mr/e.pv:0;return{...e,cr,comR,ct,mr,mp};});
    return{...p,batch,cpl,ingsD,embsC,rb,rup};
  });
}

function mgCls(v){return v>=.35?"mg-ok":v>=.2?"mg-warn":"mg-bad";}
function commOpts(sel){return COMM.map(c=>`<option value="${c}" ${c===sel?"selected":""}>${c}%</option>`).join("");}

function render(){
  const C=compute();
  const sell=C.filter(p=>!p.isIng);
  const sp=C[S.sel]||C[0];
  
  let html=`
  <div class="hdr"><div><h1>ACAILHA</h1><small>Fichas Tecnicas &amp; Precificacao</small></div>
  <button onclick="resetAll()">Restaurar</button></div>
  <div class="tabs">
    <button class="${S.tab==="painel"?"active":""}" onclick="switchTab('painel')">Painel</button>
    <button class="${S.tab==="insumos"?"active":""}" onclick="switchTab('insumos')">Insumos</button>
    <button class="${S.tab==="fichas"?"active":""}" onclick="switchTab('fichas')">Fichas Tecnicas</button>
  </div>
  <div class="wrap">`;

  if(S.tab==="painel"){
    const minC=Math.min(...sell.map(p=>p.cpl));
    const maxC=Math.max(...sell.map(p=>p.cpl));
    html+=`
    <div class="cards">
      <div class="card" style="background:#5B3A9E"><div class="lbl">Produtos</div><div class="val">${sell.length}</div></div>
      <div class="card" style="background:#4338ca"><div class="lbl">Insumos</div><div class="val">${S.ins.length}</div></div>
      <div class="card" style="background:#059669"><div class="lbl">Menor Custo/L</div><div class="val">${cur(minC)}</div></div>
      <div class="card" style="background:#dc2626"><div class="lbl">Maior Custo/L</div><div class="val">${cur(maxC)}</div></div>
    </div>
    <div class="panel"><div class="panel-hdr">RANKING POR CUSTO / LITRO <span>Clique para ver ficha</span></div>
    <div class="tbl-wrap"><table><thead><tr><th>Produto</th><th>Rend.(L)</th><th>Custo Batida</th><th>Custo/L</th><th>CX10L Preco</th><th>CX10L Margem</th></tr></thead><tbody>`;
    [...sell].sort((a,b)=>a.cpl-b.cpl).forEach(p=>{
      const cx=p.embsC[0];const mp=cx?cx.mp:0;
      html+=`<tr class="clickable" onclick="goFicha(${C.indexOf(p)})">
        <td class="bold" style="color:var(--p1)">${p.nm}</td><td>${p.rend.toFixed(1)}</td>
        <td>${cur(p.batch)}</td><td class="bold" style="color:var(--p2)">${cur(p.cpl)}</td>
        <td>${cx?cur(cx.pv):"-"}</td>
        <td>${cx&&cx.pv>0?`<span class="tag ${mgCls(mp)}">${(mp*100).toFixed(1)}%</span>`:"-"}</td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
    S.ins.filter(x=>x.pe===0&&!x.auto).forEach(x=>{html+=`<div class="alert alert-y"><b>${x.nm}:</b> preco nao cadastrado</div>`;});
  }

  if(S.tab==="insumos"){
    const roxD=compute().find(p=>p.nm==="Roxinho");
    html+=`<div class="panel"><div class="panel-hdr">CADASTRO DE INSUMOS <span>Altere o preco da embalagem</span></div>
    <div class="tbl-wrap"><table><thead><tr><th>Materia-Prima</th><th>Qtd Emb.</th><th>Un</th><th>Preco Emb. (R$)</th><th>Preco Unit.</th></tr></thead><tbody>`;
    S.ins.forEach((x,i)=>{
      const up=x.qe>0?x.pe/x.qe:0;
      const bg=x.pe===0&&!x.auto?"background:#fefce8":"";
      html+=`<tr style="${bg}">
        <td class="bold">${x.nm} ${x.auto?'<span class="tag tag-auto">AUTO</span>':""}</td>
        <td><input class="inp inp-sm" type="number" step="any" value="${x.qe}" onchange="chgIns(${x.id},'qe',this.value)"></td>
        <td style="color:#6b7280;font-weight:500">${x.un}</td>
        <td>${x.auto?`<span class="bold" style="color:var(--p3)">${cur(roxD?roxD.rb:0)}</span>`
          :`<input class="inp inp-lg" type="number" step="any" value="${x.pe}" onchange="chgIns(${x.id},'pe',this.value)">`}</td>
        <td><span class="bold ${up===0&&!x.auto?"red":"green"}">${x.auto?cur(roxD?roxD.rup:0):cur(up)}</span> <small style="color:#9ca3af">/${x.un}</small></td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  if(S.tab==="fichas"){
    html+=`<div class="prod-btns">`;
    C.forEach((p,i)=>{html+=`<button class="prod-btn ${S.sel===i?"active":""}" onclick="selProd(${i})">${p.nm}</button>`;});
    html+=`</div>`;

    if(sp){
      html+=`<div class="hero"><h2>${sp.nm}</h2><div class="meta">
        <div><span class="lbl">RENDIMENTO (L)</span><input class="inp" style="background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;width:110px" type="number" step="any" value="${sp.rend}" onchange="chgProd(${sp.id},'rend',this.value)"></div>
        <div><span class="lbl">CUSTO DA BATIDA</span><div class="big">${cur(sp.batch)}</div></div>
        <div><span class="lbl">CUSTO / LITRO</span><div class="big yellow">${cur(sp.cpl)}</div></div>
      </div></div>`;

      html+=`<div class="panel"><div class="panel-hdr">RECEITA DA BATIDA</div><div class="tbl-wrap"><table>
      <thead><tr><th>Materia-Prima</th><th>Qtd</th><th>Un</th><th style="text-align:right">Preco Un.</th><th style="text-align:right">Total</th><th style="text-align:right">%</th></tr></thead><tbody>`;
      sp.ingsD.forEach(g=>{
        html+=`<tr ${g.noPrice?'style="background:#fefce8"':""}>
          <td class="bold">${g.nome} ${g.noPrice?'<span class="tag tag-warn">SEM PRECO</span>':""}</td>
          <td><input class="inp inp-md" type="number" step="any" value="${g.q}" onchange="chgIng(${sp.id},${g.iid},this.value)"></td><td style="color:#6b7280">${g.un}</td>
          <td style="text-align:right;color:#6b7280">${cur(g.up)}</td>
          <td style="text-align:right" class="bold">${cur(g.total)}</td>
          <td style="text-align:right;color:#9ca3af">${sp.batch>0?((g.total/sp.batch)*100).toFixed(1)+"%":"-"}</td></tr>`;
      });
      html+=`<tr class="total-row"><td colspan="4">CUSTO TOTAL DA BATIDA</td><td style="text-align:right;font-size:16px">${cur(sp.batch)}</td><td style="text-align:right">100%</td></tr>`;
      html+=`</tbody></table></div></div>`;

      if(sp.embs&&sp.embs.length>0){
        html+=`<div class="panel"><div class="panel-hdr">PRECIFICACAO POR EMBALAGEM <span>Campos em azul = editaveis</span></div><div class="tbl-wrap"><table>
        <thead><tr><th>Embalagem</th><th>Litragem</th><th>C.Receita</th><th>C.Embalagem</th><th>Comissao %</th><th>Comissao R$</th><th>Preco Venda</th><th>Custo Total</th><th>Margem R$</th><th>Margem %</th></tr></thead><tbody>`;
        sp.embsC.forEach((e,i)=>{
          html+=`<tr>
            <td class="bold" style="color:var(--p1);white-space:nowrap;font-size:14px">${e.nm}</td>
            <td><input class="inp inp-sm" type="number" step="any" value="${e.lit}" onchange="chgEmb(${sp.id},${i},'lit',this.value)"></td>
            <td style="text-align:right">${cur(e.cr)}</td>
            <td><input class="inp inp-sm" type="number" step="any" value="${e.ce}" onchange="chgEmb(${sp.id},${i},'ce',this.value)"></td>
            <td><select class="inp" onchange="chgEmb(${sp.id},${i},'com',this.value)">${commOpts(e.com)}</select></td>
            <td style="text-align:right;color:#6b7280">${cur(e.comR)}</td>
            <td><input class="inp inp-md" type="number" step="any" value="${e.pv}" onchange="chgEmb(${sp.id},${i},'pv',this.value)"></td>
            <td style="text-align:right" class="bold">${cur(e.ct)}</td>
            <td style="text-align:right" class="bold ${e.mr>=0?"green":"red"}">${cur(e.mr)}</td>
            <td style="text-align:center">${e.pv>0?`<span class="tag ${mgCls(e.mp)}">${(e.mp*100).toFixed(1)}%</span>`:`<span style="color:#9ca3af">-</span>`}</td>
          </tr>`;
        });
        html+=`</tbody></table></div></div>`;
      }

      if(sp.isIng){
        html+=`<div class="info-box"><b>Produto de uso interno.</b> O custo por litro (${cur(sp.cpl)}) e usado automaticamente nos demais produtos.</div>`;
      }
    }
  }

  html+=`</div><div class="foot">Genesis Gestao — BPO &amp; Consultoria Empresarial &middot; Dados salvos automaticamente</div>`;
  document.getElementById("app").innerHTML=html;
}

function switchTab(t){S.tab=t;render();}
function selProd(i){S.sel=i;render();}
function goFicha(i){S.sel=i;S.tab="fichas";render();}

function chgIns(id,f,v){const x=S.ins.find(i=>i.id===id);if(x)x[f]=parseFloat(v)||0;render();saveData();}
function chgProd(id,f,v){const p=S.prods.find(x=>x.id===id);if(p)p[f]=parseFloat(v)||0;render();saveData();}
function chgEmb(pid,ei,f,v){const p=S.prods.find(x=>x.id===pid);if(p&&p.embs[ei])p.embs[ei][f]=parseFloat(v)||0;render();saveData();}
function chgIng(pid,iid,v){const p=S.prods.find(x=>x.id===pid);if(p){const g=p.ings.find(x=>x.iid===iid);if(g)g.q=parseFloat(v)||0;}render();saveData();}

function resetAll(){
  S.ins=JSON.parse(JSON.stringify(INIT_INS));
  S.prods=JSON.parse(JSON.stringify(INIT_PRODS));
  render();
  try{localStorage.removeItem("acailha-v6");}catch(e){}
}

loadData();
</script>
</body>
</html>
